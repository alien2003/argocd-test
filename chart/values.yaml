replicaCount: 1

image:
  repository: nginx
  tag: stable-alpine
  pullPolicy: IfNotPresent

service:
  port: 80

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"

html:
  title: "ArgoCD Test"
  heading: "It works!"
  subtitle: "Deployed via ArgoCD from Git"
  bgColor: "#1a1a2e"
  accentColor: "#00d2ff"
